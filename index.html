<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Your Personal To-Do App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --light-gray: #e9ecef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .app-controls {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: var(--light);
            border-bottom: 1px solid var(--light-gray);
        }

        .task-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .task-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        .date-time-input {
            padding: 12px 15px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            font-size: 0.9rem;
            min-width: 180px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #d1145a;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #2bb5e0;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gray);
            color: var(--dark);
        }

        .btn-outline:hover {
            background: var(--light-gray);
        }

        .task-filters {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--light-gray);
            background: white;
        }

        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: transparent;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
        }

        .filter-btn:hover:not(.active) {
            background: var(--light-gray);
        }

        .tasks-container {
            padding: 20px;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
            border-left: 4px solid var(--primary);
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .task-item.completed {
            opacity: 0.7;
            border-left-color: var(--success);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--gray);
        }

        .task-datetime {
            font-size: 0.85rem;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: var(--gray);
            transition: all 0.3s;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--light-gray);
        }

        .edit-btn:hover {
            color: var(--primary);
        }

        .delete-btn:hover {
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: var(--light);
            border-top: 1px solid var(--light-gray);
            font-size: 0.9rem;
            color: var(--gray);
        }

        .task-edit-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
            padding: 15px;
            background: var(--light);
            border-radius: 8px;
        }

        .edit-inputs {
            display: flex;
            gap: 10px;
        }

        .edit-inputs input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--light-gray);
            border-radius: 6px;
        }

        .edit-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        @media (max-width: 600px) {
            .app-controls {
                flex-direction: column;
            }
            
            .edit-inputs {
                flex-direction: column;
            }
            
            .task-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .task-actions {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tasks"></i> TaskMaster</h1>
            <p>Organize your tasks efficiently and boost your productivity</p>
        </header>
        
        <div class="app-controls">
            <input type="text" class="task-input" id="taskInput" placeholder="Add a new task...">
            <input type="datetime-local" class="date-time-input" id="taskDateTime">
            <button class="btn btn-primary" id="addTaskBtn">
                <i class="fas fa-plus"></i> Add Task
            </button>
        </div>
        
        <div class="task-filters">
            <button class="filter-btn active" data-filter="all">All Tasks</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn" data-filter="today">Today</button>
        </div>
        
        <div class="tasks-container">
            <ul class="task-list" id="taskList">
                <!-- Tasks will be added here dynamically -->
            </ul>
            
            <div class="empty-state" id="emptyState">
                <i class="fas fa-clipboard-list"></i>
                <h3>No tasks yet</h3>
                <p>Add a task to get started with your productivity journey!</p>
            </div>
        </div>
        
        <div class="stats">
            <span id="totalTasks">Total: 0 tasks</span>
            <span id="completedTasks">Completed: 0 tasks</span>
        </div>
    </div>

    <script>
        // DOM Elements
        const taskInput = document.getElementById('taskInput');
        const taskDateTime = document.getElementById('taskDateTime');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const totalTasksSpan = document.getElementById('totalTasks');
        const completedTasksSpan = document.getElementById('completedTasks');

        // Set minimum datetime to current time
        const now = new Date();
        const timezoneOffset = now.getTimezoneOffset() * 60000;
        const localISOTime = new Date(now - timezoneOffset).toISOString().slice(0, 16);
        taskDateTime.min = localISOTime;

        // Tasks array
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';

        // Initialize the app
        function init() {
            renderTasks();
            updateStats();
            
            // Event Listeners
            addTaskBtn.addEventListener('click', addTask);
            taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
            
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderTasks();
                });
            });
        }

        // Add a new task
        function addTask() {
            const title = taskInput.value.trim();
            const dateTime = taskDateTime.value;
            
            if (!title) {
                alert('Please enter a task title');
                return;
            }
            
            const newTask = {
                id: Date.now(),
                title,
                completed: false,
                dateTime: dateTime || null,
                createdAt: new Date().toISOString()
            };
            
            tasks.unshift(newTask);
            saveTasks();
            renderTasks();
            updateStats();
            
            // Reset input fields
            taskInput.value = '';
            taskDateTime.value = '';
            taskInput.focus();
        }

        // Toggle task completion
        function toggleTask(id) {
            tasks = tasks.map(task => {
                if (task.id === id) {
                    return { ...task, completed: !task.completed };
                }
                return task;
            });
            
            saveTasks();
            renderTasks();
            updateStats();
        }

        // Delete a task
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(task => task.id !== id);
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        // Edit a task
        function editTask(id) {
            const task = tasks.find(task => task.id === id);
            if (!task) return;
            
            const taskItem = document.querySelector(`[data-id="${id}"]`);
            const taskContent = taskItem.querySelector('.task-content');
            
            // Create edit form
            const editForm = document.createElement('div');
            editForm.className = 'task-edit-form';
            editForm.innerHTML = `
                <div class="edit-inputs">
                    <input type="text" class="edit-title" value="${task.title}">
                    <input type="datetime-local" class="edit-datetime" value="${task.dateTime || ''}">
                </div>
                <div class="edit-actions">
                    <button class="btn btn-outline cancel-edit">Cancel</button>
                    <button class="btn btn-primary save-edit">Save</button>
                </div>
            `;
            
            // Replace task content with edit form
            taskContent.innerHTML = '';
            taskContent.appendChild(editForm);
            
            // Set minimum datetime for edit
            const editDateTime = editForm.querySelector('.edit-datetime');
            editDateTime.min = localISOTime;
            
            // Event listeners for edit form
            editForm.querySelector('.cancel-edit').addEventListener('click', () => {
                renderTasks();
            });
            
            editForm.querySelector('.save-edit').addEventListener('click', () => {
                const newTitle = editForm.querySelector('.edit-title').value.trim();
                const newDateTime = editForm.querySelector('.edit-datetime').value;
                
                if (!newTitle) {
                    alert('Task title cannot be empty');
                    return;
                }
                
                tasks = tasks.map(t => {
                    if (t.id === id) {
                        return { ...t, title: newTitle, dateTime: newDateTime || null };
                    }
                    return t;
                });
                
                saveTasks();
                renderTasks();
            });
        }

        // Save tasks to localStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Render tasks based on current filter
        function renderTasks() {
            // Filter tasks
            let filteredTasks = tasks;
            
            if (currentFilter === 'pending') {
                filteredTasks = tasks.filter(task => !task.completed);
            } else if (currentFilter === 'completed') {
                filteredTasks = tasks.filter(task => task.completed);
            } else if (currentFilter === 'today') {
                const today = new Date().toDateString();
                filteredTasks = tasks.filter(task => {
                    if (!task.dateTime) return false;
                    const taskDate = new Date(task.dateTime).toDateString();
                    return taskDate === today;
                });
            }
            
            // Update empty state visibility
            if (filteredTasks.length === 0) {
                emptyState.style.display = 'block';
                taskList.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                taskList.style.display = 'block';
            }
            
            // Render tasks
            taskList.innerHTML = '';
            
            filteredTasks.forEach(task => {
                const taskItem = document.createElement('li');
                taskItem.className = `task-item ${task.completed ? 'completed' : ''}`;
                taskItem.setAttribute('data-id', task.id);
                
                // Format date for display
                let dateDisplay = '';
                if (task.dateTime) {
                    const taskDate = new Date(task.dateTime);
                    dateDisplay = taskDate.toLocaleString();
                }
                
                taskItem.innerHTML = `
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        ${dateDisplay ? `<div class="task-datetime"><i class="far fa-clock"></i> ${dateDisplay}</div>` : ''}
                    </div>
                    <div class="task-actions">
                        <button class="action-btn edit-btn"><i class="fas fa-edit"></i></button>
                        <button class="action-btn delete-btn"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                
                // Add event listeners
                taskItem.querySelector('.task-checkbox').addEventListener('change', () => toggleTask(task.id));
                taskItem.querySelector('.edit-btn').addEventListener('click', () => editTask(task.id));
                taskItem.querySelector('.delete-btn').addEventListener('click', () => deleteTask(task.id));
                
                taskList.appendChild(taskItem);
            });
        }

        // Update statistics
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            
            totalTasksSpan.textContent = `Total: ${total} task${total !== 1 ? 's' : ''}`;
            completedTasksSpan.textContent = `Completed: ${completed} task${completed !== 1 ? 's' : ''}`;
        }

        // Initialize the app
        init();
    </script>
</body>
</html>
